name: dialex

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Mapped to 5433 on the host, not 5432 — avoids clashing with any
      # pre-existing local Postgres already using the default port.
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  django:
    build: ./backend
    env_file:
      - backend/.env
    environment:
      # Overrides backend/.env's localhost DATABASE_URL — inside compose,
      # Django reaches Postgres via the service name, not localhost.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      # Dev convenience: live code reload without rebuilding the image.
      - ./backend/src:/app/src
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  fastapi:
    build: ./fastapi_service
    env_file:
      - fastapi_service/.env
    environment:
      # Same override pattern as django — compose-internal hostname, not localhost.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./fastapi_service/app:/app/app
    ports:
      # Host 8001 was already taken — mapped to 8010 instead (container
      # still listens on 8001 internally).
      - "8010:8001"
    depends_on:
      db:
        condition: service_healthy

  temporal-postgresql:
    image: postgres:${POSTGRESQL_VERSION}
    environment:
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD}
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEMPORAL_POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    ports:
      - "7233:7233"
    volumes:
      - ./backend/dynamicconfig:/etc/temporal/config/dynamicconfig
    depends_on:
      temporal-postgresql:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      # Host 8080 was already taken (same story as the Postgres/Redis ports
      # above) — mapped to 8088 instead.
      - "8088:8080"
    depends_on:
      - temporal

  redis:
    image: redis:8
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  db_data:
  temporal_db_data:
